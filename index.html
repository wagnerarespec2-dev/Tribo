
<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PÁGINAS - REDE LIVRE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      :root { 
        color-scheme: dark;
        --msn-bg: #030303;
        --msn-sidebar: #0a0a0a;
        --msn-bubble-me: #10b981;
        --msn-bubble-them: #18181b;
        --msn-text: #fff;
        --msn-border: rgba(255, 255, 255, 0.05);
      }

      html.light {
        color-scheme: light;
        --msn-bg: #f0f2f5;
        --msn-sidebar: #ffffff;
        --msn-bubble-me: #dcf8c6;
        --msn-bubble-them: #ffffff;
        --msn-text: #1c1e21;
        --msn-border: rgba(0, 0, 0, 0.08);
      }

      html.nostalgia {
        color-scheme: light;
        --msn-bg: #E3F2FD;
        --msn-sidebar: #FFFFFF;
        --msn-bubble-me: #FF9800;
        --msn-bubble-them: #E1F5FE;
        --msn-text: #01579B;
        --msn-border: #BBDEFB;
      }

      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: #000;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none;
        min-height: 100vh;
        min-height: 100dvh;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      .incognito-blur {
        filter: blur(12px);
        transition: filter 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .avatar-animated {
        position: relative;
        animation: avatarPulse 3s infinite ease-in-out;
      }

      @keyframes avatarPulse {
        0%, 100% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.4); }
        50% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      }

      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      @keyframes slideUpFade {
        0% {
          opacity: 0;
          transform: translateY(60px) scale(0.92);
          filter: blur(4px);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      .post-animation {
        animation: slideUpFade 1.2s cubic-bezier(0.23, 1, 0.32, 1) both;
      }

      .stagger-1 { animation-delay: 0.05s; }
      .stagger-2 { animation-delay: 0.15s; }
      .stagger-3 { animation-delay: 0.25s; }
      .stagger-4 { animation-delay: 0.35s; }
      .stagger-5 { animation-delay: 0.45s; }

      @keyframes nudgeEffect {
        0%, 100% { transform: translate(0,0); }
        10% { transform: translate(-8px,-8px); }
        20% { transform: translate(8px,8px); }
        30% { transform: translate(-8px,8px); }
        40% { transform: translate(8px,-8px); }
      }

      .animate-nudge { animation: nudgeEffect 0.3s cubic-bezier(.36,.07,.19,.97) both; }

      @keyframes heartPulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.4); }
        100% { transform: scale(1); }
      }

      .animate-heart-pulse {
        animation: heartPulse 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      .typing-indicator span {
        display: inline-block;
        width: 5px;
        height: 5px;
        background: currentColor;
        border-radius: 50%;
        margin: 0 1px;
        animation: typing 1s infinite;
      }
      @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

      .theme-nostalgia .bg-emerald-500 { background-color: #FF9800 !important; }
      
      .pt-safe { padding-top: env(safe-area-inset-top); }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.564.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
